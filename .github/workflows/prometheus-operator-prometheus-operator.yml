name: 'prometheus-operator::prometheus-operator'


on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:  # 手动触发按钮

jobs:
  generate-dockerfile:
    if: github.repository == 'Loongson-Cloud-Community/container-ci'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run ci.sh
        run: |
          date
          pushd prometheus-operator/prometheus-operator && ./ci.sh && popd

