name: 'prometheus::node_exporter'


on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:  # 手动触发按钮

jobs:
  generate-php-dockerfile:
    if: github.repository == 'Loongson-Cloud-Community/container-ci'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run ci.sh
        run: |
          date
          pushd prometheus/node_exporter && ./ci.sh && popd

